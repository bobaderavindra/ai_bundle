version: "3.9"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: investai-mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5000:5000"

  kafka:
    image: bitnami/kafka:3.7
    container_name: investai-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
      - "9094:9094"

  auth-db:
    image: postgres:16
    container_name: investai-auth-db
    environment:
      POSTGRES_DB: investai_auth
      POSTGRES_USER: investai
      POSTGRES_PASSWORD: investai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investai -d investai_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-service:
    build: ./gateway-service
    container_name: investai-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8082
      RISK_SERVICE_URL: http://risk-service:8083
      RESEARCH_SERVICE_URL: http://research-service:8084
      ML_SERVICE_URL: http://ml-service:8085
      OPTIMIZATION_SERVICE_URL: http://optimization-service:8086
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - portfolio-service
      - risk-service
      - research-service
      - ml-service
      - optimization-service

  auth-service:
    build: ./auth-service
    container_name: investai-auth
    environment:
      AUTH_JWT_SECRET: investai-super-secret-key-change-me-2026
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/investai_auth
      AUTH_DB_USERNAME: investai
      AUTH_DB_PASSWORD: investai
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8081:8081"

  portfolio-service:
    build: ./portfolio-service
    container_name: investai-portfolio
    environment:
      PORTFOLIO_DB_URL: jdbc:postgresql://auth-db:5432/investai_auth
      PORTFOLIO_DB_USERNAME: investai
      PORTFOLIO_DB_PASSWORD: investai
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PORTFOLIO_TRADE_TOPIC: portfolio.trade.executed
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8082:8082"

  risk-service:
    build: ./risk-service
    container_name: investai-risk
    environment:
      RISK_DB_HOST: auth-db
      RISK_DB_PORT: 5432
      RISK_DB_NAME: investai_auth
      RISK_DB_USERNAME: investai
      RISK_DB_PASSWORD: investai
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RISK_CONSUMER_GROUP: risk-service
      RISK_CONSUME_TOPICS: portfolio.trade.executed,optimization.events
      RISK_EVENT_TOPIC: risk.events
      RISK_EVENT_CACHE_SIZE: 200
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8083"

  research-service:
    build: ./research-service
    container_name: investai-research
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8084:8084"

  ml-service:
    build: ./ml-service
    container_name: investai-ml
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: investai-ml
    depends_on:
      mlflow:
        condition: service_started
    ports:
      - "8085:8085"

  optimization-service:
    build: ./optimization-service
    container_name: investai-optimization
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPTIMIZATION_CONSUMER_GROUP: optimization-service
      OPTIMIZATION_CONSUME_TOPICS: portfolio.trade.executed,optimization.events
      OPTIMIZATION_EVENT_TOPIC: optimization.events
      OPTIMIZATION_EVENT_CACHE_SIZE: 200
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "8086:8086"

  frontend:
    build: ./frontend
    container_name: investai-frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway-service

volumes:
  mlflow-data:
