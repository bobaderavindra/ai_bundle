---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: auth-db
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: investai_auth
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: investai-secrets
                  key: auth-db-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investai-secrets
                  key: auth-db-password
          ports:
            - containerPort: 5432
