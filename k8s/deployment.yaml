apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: investai/gateway-service:latest
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: PORTFOLIO_SERVICE_URL
              value: http://portfolio-service:8082
            - name: RISK_SERVICE_URL
              value: http://risk-service:8083
            - name: RESEARCH_SERVICE_URL
              value: http://research-service:8084
            - name: ML_SERVICE_URL
              value: http://ml-service:8085
            - name: OPTIMIZATION_SERVICE_URL
              value: http://optimization-service:8086
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: investai/auth-service:latest
          env:
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: investai-secrets
                  key: auth-jwt-secret
            - name: AUTH_DB_URL
              value: jdbc:postgresql://auth-db:5432/investai_auth
            - name: AUTH_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: investai-secrets
                  key: auth-db-username
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investai-secrets
                  key: auth-db-password
          ports:
            - containerPort: 8081
---
