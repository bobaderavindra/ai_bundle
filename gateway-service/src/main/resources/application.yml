server:
  port: 8088

investai:
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8091}
  portfolio-service-url: ${PORTFOLIO_SERVICE_URL:http://localhost:8092}
  ml-service-url: ${ML_SERVICE_URL:http://localhost:8095}
  optimization-service-url: ${OPTIMIZATION_SERVICE_URL:http://localhost:8096}
  research-service-url: ${RESEARCH_SERVICE_URL:http://localhost:8097}
  risk-service-url: ${RISK_SERVICE_URL:http://localhost:8098}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: ${investai.auth-service-url}
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/?(?<segment>.*), /auth/${segment}

        - id: portfolio-service
          uri: ${investai.portfolio-service-url}
          predicates:
            - Path=/api/portfolio/**
          filters:
            - RewritePath=/api/portfolio/?(?<segment>.*), /portfolio/${segment}

        - id: portfolio-trade
          uri: ${investai.portfolio-service-url}
          predicates:
            - Path=/api/trade,/api/trade/**
          filters:
            - RewritePath=/api/trade/?(?<segment>.*), /trade/${segment}

        - id: portfolio-allocation
          uri: ${investai.portfolio-service-url}
          predicates:
            - Path=/api/allocation,/api/allocation/**
          filters:
            - RewritePath=/api/allocation/?(?<segment>.*), /allocation/${segment}

        - id: risk-service
          uri: ${investai.risk-service-url}
          predicates:
            - Path=/api/risk/**
          filters:
            - RewritePath=/api/risk/?(?<segment>.*), /risk/${segment}

        - id: research-service
          uri: ${investai.research-service-url}
          predicates:
            - Path=/api/research/**
          filters:
            - RewritePath=/api/research/?(?<segment>.*), /research/${segment}

        - id: ml-service
          uri: ${investai.ml-service-url}
          predicates:
            - Path=/api/ml/**
          filters:
            - RewritePath=/api/ml/?(?<segment>.*), /ml/${segment}

        - id: optimization-service
          uri: ${investai.optimization-service-url}
          predicates:
            - Path=/api/optimization/**
          filters:
            - RewritePath=/api/optimization/?(?<segment>.*), /optimization/${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info
