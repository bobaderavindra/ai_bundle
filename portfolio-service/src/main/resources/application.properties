server.port=8092
spring.application.name=portfolio-service

spring.datasource.url=${PORTFOLIO_DB_URL:jdbc:postgresql://localhost:5450/postgres}
spring.datasource.username=${PORTFOLIO_DB_USERNAME:postgres}
spring.datasource.password=${PORTFOLIO_DB_PASSWORD:root1234}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=invest_platform_ai

# Kafka Server
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
portfolio.kafka.trade-topic=${PORTFOLIO_TRADE_TOPIC:portfolio.trade.executed}
portfolio.kafka.consumer-group=${PORTFOLIO_CONSUMER_GROUP:portfolio-service-consumer}

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Consumer Configuration
spring.kafka.consumer.group-id=${portfolio.kafka.consumer-group}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.investai.portfolio.events
spring.kafka.consumer.properties.spring.json.value.default.type=com.investai.portfolio.events.TradeExecutedEvent

# Listener settings
spring.kafka.listener.missing-topics-fatal=false

spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.enable-auto-commit=true
