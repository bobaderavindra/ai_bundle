server.port=8082
spring.application.name=portfolio-service

spring.datasource.url=${PORTFOLIO_DB_URL:jdbc:postgresql://localhost:5450/postgres}
spring.datasource.username=${PORTFOLIO_DB_USERNAME:postgres}
spring.datasource.password=${PORTFOLIO_DB_PASSWORD:root1234}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=invest_platform_ai

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
portfolio.kafka.trade-topic=${PORTFOLIO_TRADE_TOPIC:portfolio.trade.executed}
